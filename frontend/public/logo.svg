<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="capGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="spotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdf4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fdf4ff" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stem -->
  <rect x="82" y="118" width="36" height="52" rx="10" fill="#c4b5fd"/>
  <!-- Stem highlight -->
  <rect x="88" y="122" width="12" height="40" rx="6" fill="#ede9fe" opacity="0.5"/>

  <!-- Cap -->
  <ellipse cx="100" cy="105" rx="72" ry="30" fill="url(#capGrad)" filter="url(#glow)"/>
  <path d="M28 105 Q100 28 172 105" fill="url(#capGrad)" filter="url(#glow)"/>

  <!-- Cap edge underside -->
  <ellipse cx="100" cy="105" rx="72" ry="14" fill="#a855f7" opacity="0.6"/>

  <!-- Spots -->
  <circle cx="72"  cy="72"  r="11" fill="url(#spotGrad)"/>
  <circle cx="108" cy="58"  r="9"  fill="url(#spotGrad)"/>
  <circle cx="140" cy="78"  r="10" fill="url(#spotGrad)"/>
  <circle cx="58"  cy="95"  r="7"  fill="url(#spotGrad)"/>
  <circle cx="130" cy="98"  r="8"  fill="url(#spotGrad)"/>

  <!-- Glow ring -->
  <ellipse cx="100" cy="170" rx="40" ry="6" fill="#a855f7" opacity="0.25"/>
</svg>
